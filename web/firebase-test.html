<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NEXIS — Firebase Connection Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #c8c0b8;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      border: 1px solid #2a2420;
      border-radius: 6px;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2420;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title { font-size: 11px; letter-spacing: 0.2em; color: #c8a86b; }
    .ts { font-size: 10px; color: #5a524a; }
    .body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .row {
      border: 1px solid #2a2420;
      border-radius: 4px;
      overflow: hidden;
    }
    .row-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      background: #181410;
    }
    .indicator {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #3a3230;
      animation: pulse 1s ease-in-out infinite;
    }
    .indicator.ok  { background: #4caf7a; animation: none; }
    .indicator.err { background: #e05c5c; animation: none; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
    .label { color: #8a8078; }
    .status { margin-left: auto; font-size: 10px; }
    .status.ok  { color: #4caf7a; }
    .status.err { color: #e05c5c; }
    .status.pending { color: #5a524a; }
    .data {
      padding: 10px 14px;
      border-top: 1px solid #2a2420;
      font-size: 11px;
      color: #5a8a6a;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }
    .data.err { color: #a05050; }
    .footer {
      padding: 12px 20px;
      border-top: 1px solid #2a2420;
      font-size: 10px;
      color: #3a3230;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="title">NEXIS · FIREBASE CONNECTION TEST</span>
    <span class="ts" id="ts"></span>
  </div>
  <div class="body">
    <div class="row" id="row-lock">
      <div class="row-header">
        <div class="indicator" id="ind-lock"></div>
        <span class="label">/locks/nexis_001</span>
        <span class="status pending" id="st-lock">checking…</span>
      </div>
    </div>
    <div class="row" id="row-alerts">
      <div class="row-header">
        <div class="indicator" id="ind-alerts"></div>
        <span class="label">/alerts  (latest 1)</span>
        <span class="status pending" id="st-alerts">checking…</span>
      </div>
    </div>
  </div>
  <div class="footer" id="footer">project: nexis-bike-lock</div>
</div>

<script type="module">
import { initializeApp }                          from 'https://esm.sh/firebase/app'
import { getFirestore, doc, getDoc,
         collection, query, orderBy,
         limit, getDocs }                         from 'https://esm.sh/firebase/firestore'

const firebaseConfig = {
  apiKey:            'AIzaSyAjxHkdVZepyxNCVvj5MnALPIJ9bH01wWQ',
  authDomain:        'nexis-bike-lock.firebaseapp.com',
  projectId:         'nexis-bike-lock',
  storageBucket:     'nexis-bike-lock.firebasestorage.app',
  messagingSenderId: '303748770080',
  appId:             '1:303748770080:web:270c285742590a7fd44f45',
}

document.getElementById('ts').textContent = new Date().toLocaleTimeString()

const app = initializeApp(firebaseConfig)
const db  = getFirestore(app)

function setResult(id, ok, detail) {
  const ind = document.getElementById('ind-' + id)
  const st  = document.getElementById('st-'  + id)
  const row = document.getElementById('row-' + id)
  ind.className = 'indicator ' + (ok ? 'ok' : 'err')
  st.className  = 'status '    + (ok ? 'ok' : 'err')
  st.textContent = ok ? 'connected' : 'failed'
  const data = document.createElement('div')
  data.className = 'data ' + (ok ? '' : 'err')
  data.textContent = detail
  row.appendChild(data)
}

// Check 1 — lock document
getDoc(doc(db, 'locks', 'nexis_001'))
  .then(snap => {
    if (snap.exists()) {
      setResult('lock', true, JSON.stringify(snap.data(), null, 2))
    } else {
      setResult('lock', false, 'document does not exist yet\n(create it when firmware first connects, or add it manually in Firebase Console)')
    }
  })
  .catch(err => setResult('lock', false, err.code + ': ' + err.message))

// Check 2 — alerts collection
getDocs(query(collection(db, 'alerts'), orderBy('timestamp', 'desc'), limit(1)))
  .then(snap => {
    if (!snap.empty) {
      const d = snap.docs[0]
      setResult('alerts', true, 'id: ' + d.id + '\n' + JSON.stringify(d.data(), null, 2))
    } else {
      setResult('alerts', true, 'collection is empty — no alerts yet (rules OK)')
    }
  })
  .catch(err => setResult('alerts', false, err.code + ': ' + err.message))
</script>

</body>
</html>
